name: Release firmware

# Triggered on:
#   - push of any tag matching v* → builds every env in the matrix
#     and attaches firmware.zip + firmware.hex to a GitHub Release
#   - manual workflow_dispatch → builds the same artifacts and uploads
#     them as workflow artifacts, but DOES NOT create or modify a
#     release. Use this to smoke-test the build pipeline before
#     committing to a tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write      # softprops/action-gh-release needs to create/update releases

# Opt into Node.js 24 for JavaScript-based actions now rather than
# waiting for GitHub's June 2026 forced migration. Silences the
# "Node.js 20 actions are deprecated" warning and future-proofs the
# workflow without requiring us to pin to unreleased action versions.
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.board }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        board:
          - Faketec
          # Phase 7 adds:
          # - RAK4631
          # - XIAO_nRF52840

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO toolchains and libraries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build ${{ matrix.board }}
        run: pio run -e ${{ matrix.board }}

      - name: Stage release assets
        id: stage
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # On tag push GITHUB_REF_NAME is the tag (v0.1.0-test, ...).
          # On workflow_dispatch it's the branch name (master) which
          # would produce misleading artifact names, so substitute a
          # timestamp so dispatch runs are obviously smoke-test builds
          # rather than anything release-adjacent.
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="manual-$(date +%Y%m%d-%H%M%S)"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          BOARD="${{ matrix.board }}"
          BASE="reticulum-lora-repeater-${BOARD}-${VERSION}"
          cp ".pio/build/${BOARD}/firmware.zip" "release-assets/${BASE}.zip"
          cp ".pio/build/${BOARD}/firmware.hex" "release-assets/${BASE}.hex"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "base=${BASE}"       >> "$GITHUB_OUTPUT"
          ls -la release-assets/

      # Always upload as workflow artifacts so manual dispatch runs
      # are useful for pre-release smoke testing without touching
      # Releases.
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}-${{ steps.stage.outputs.version }}
          path: release-assets/*
          retention-days: 30

      # If a previous run (or a retargeted tag) left a Release object
      # hanging around for this tag, delete it here so the attach step
      # below can always create a clean new Release from scratch.
      # Without this, softprops/action-gh-release ends up in a retry
      # loop trying to update an existing release whose assets were
      # partially written by a failed prior run, and eventually bails
      # out with "Too many retries." We leave the git tag itself in
      # place (--cleanup-tag=false) because the current workflow run
      # is literally BEING triggered by that tag. The `|| true`
      # guard makes the step idempotent: on the first ever run for a
      # given tag, there's no release to delete and gh exits non-zero.
      - name: Delete existing Release for a clean slate
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release delete "${GITHUB_REF_NAME}" --yes --cleanup-tag=false 2>&1 || true
        env:
          GH_TOKEN: ${{ github.token }}

      # Attach assets to the GitHub Release. Only runs when the
      # trigger is a tag push (not manual dispatch). With the delete
      # step above, this always creates a fresh Release rather than
      # updating an existing one, avoiding the asset-replace retry
      # storm softprops gets into when assets collide.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Flashing

            The easiest way to flash is the **web flasher** — visit
            https://thatSFguy.github.io/reticulum-lora-repeater/
            and pick this version from the dropdown. No toolchain
            install required, works in any Chromium-based browser.

            ## Manual flashing

            Assets attached to this release:

            | File                                | How to use                                             |
            |-------------------------------------|--------------------------------------------------------|
            | `*-Faketec-*.zip`                   | `adafruit-nrfutil dfu serial -pkg <zip> -p <port>`, or the web flasher |
            | `*-Faketec-*.hex`                   | nRFConnect Programmer, J-Link Commander, or any SWD tool |

            Put the board in **bootloader mode** (double-tap reset
            within ~500 ms) before flashing over serial. The Adafruit
            nRF52 bootloader exposes a different USB CDC device than
            the application firmware.

  # --------------------------------------------------------------------
  #  publish-to-pages — copies the built firmware into docs/firmware/
  #  so the webflasher can fetch it same-origin (no CORS headaches).
  #
  #  This runs once per tag push after every matrix build finishes,
  #  downloads all board artifacts in one go, stages them under
  #  docs/firmware/<tag>/, regenerates docs/firmware/manifest.json,
  #  and pushes the result back to master as a single commit. The
  #  workflow isn't triggered by pushes to master (only tags +
  #  workflow_dispatch), so this back-commit doesn't create an
  #  infinite CI loop.
  # --------------------------------------------------------------------
  publish-to-pages:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master (not the tag — we're committing to master)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all board artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          pattern: firmware-*

      - name: Stage firmware under docs/firmware/<tag>/
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TARGET="docs/firmware/${TAG}"
          mkdir -p "${TARGET}"
          # actions/download-artifact lays each artifact out under
          # downloaded-artifacts/<artifact-name>/. Flatten everything
          # into the target directory.
          find downloaded-artifacts -type f \( -name '*.zip' -o -name '*.hex' \) \
            -exec cp -v {} "${TARGET}/" \;
          ls -la "${TARGET}"

      - name: Regenerate manifest
        run: python scripts/gen_firmware_manifest.py

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/firmware/
          if git diff --cached --quiet; then
            echo "No firmware changes to commit."
            exit 0
          fi
          git commit -m "ci: publish ${GITHUB_REF_NAME} firmware to docs/firmware/"
          git push origin HEAD:master
