name: Release firmware

# Pipeline shape:
#
#   build (matrix: one job per board)
#     ↓  each uploads firmware-<board>-<tag> as a workflow artifact
#   publish (single job, runs after all matrix jobs succeed)
#     ↓  downloads every artifact
#     ↓  creates ONE GitHub Release with all boards' assets attached
#     ↓  commits same assets into docs/firmware/<tag>/ for the
#        same-origin webflasher path
#
# Triggered on:
#   - push of any tag matching v* → full pipeline runs, creates a
#     GitHub Release, publishes to Pages
#   - manual workflow_dispatch → matrix builds run and upload workflow
#     artifacts for smoke-testing, but the publish job is skipped
#     (guarded by `if: startsWith(github.ref, 'refs/tags/')`) so
#     dispatch runs never touch Releases or master.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write      # softprops/action-gh-release needs to create/update releases

# Opt into Node.js 24 for JavaScript-based actions now rather than
# waiting for GitHub's June 2026 forced migration. Silences the
# "Node.js 20 actions are deprecated" warning and future-proofs the
# workflow without requiring us to pin to unreleased action versions.
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.board }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        board:
          - Faketec
          - RAK4631
          - XIAO_nRF52840
          - Heltec_T114
          - RAK3401

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO toolchains and libraries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build ${{ matrix.board }}
        run: pio run -e ${{ matrix.board }}

      - name: Stage release assets
        id: stage
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # On tag push GITHUB_REF_NAME is the tag (v0.1.0-test, ...).
          # On workflow_dispatch it's the branch name (master) which
          # would produce misleading artifact names, so substitute a
          # timestamp so dispatch runs are obviously smoke-test builds
          # rather than anything release-adjacent.
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="manual-$(date +%Y%m%d-%H%M%S)"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          BOARD="${{ matrix.board }}"
          BASE="reticulum-lora-repeater-${BOARD}-${VERSION}"
          cp ".pio/build/${BOARD}/firmware.zip" "release-assets/${BASE}.zip"
          cp ".pio/build/${BOARD}/firmware.hex" "release-assets/${BASE}.hex"
          # Generate UF2 explicitly (PlatformIO post-actions don't
          # reliably fire on CI). All nRF52840 boards get a UF2 file
          # for drag-and-drop flashing on boards with UF2 bootloaders.
          python scripts/hex2uf2.py ".pio/build/${BOARD}/firmware.hex" "release-assets/${BASE}.uf2"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "base=${BASE}"       >> "$GITHUB_OUTPUT"
          ls -la release-assets/

      # Always upload as workflow artifacts so manual dispatch runs
      # are useful for pre-release smoke testing without touching
      # Releases.
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}-${{ steps.stage.outputs.version }}
          path: release-assets/*
          retention-days: 30

  # --------------------------------------------------------------------
  #  publish — single post-matrix job that handles BOTH the GitHub
  #  Release creation and the docs/firmware/ Pages commit. Combining
  #  these two responsibilities into one job avoids the matrix-race
  #  where two parallel "Create GitHub Release with assets" steps
  #  fought over the same tag and one failed with "release already
  #  exists" (what killed the v0.1.0 tag run at SHA f06274b).
  #
  #  This job runs exactly once per tag push after every matrix build
  #  has uploaded its workflow artifact. It downloads all board
  #  artifacts in one go, creates the GitHub Release with EVERY
  #  board's assets attached to one release object, and commits the
  #  same assets into docs/firmware/<tag>/ so the webflasher serves
  #  them same-origin.
  #
  #  The matrix build job NO LONGER touches Releases — it just builds,
  #  stages, and uploads a workflow artifact. Clean separation of
  #  responsibilities; adding more boards to the matrix requires no
  #  further changes to this job.
  # --------------------------------------------------------------------
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout master (we commit docs/firmware/ back to master)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all board artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          pattern: firmware-*

      - name: Stage release assets (flat layout for gh release upload)
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # actions/download-artifact lays each artifact out under
          # downloaded-artifacts/<artifact-name>/. Flatten into a
          # single directory so gh release create can glob them.
          find downloaded-artifacts -type f \( -name '*.zip' -o -name '*.hex' \) \
            -exec cp -v {} release-assets/ \;
          echo "Release assets staged:"
          ls -la release-assets/

      - name: Delete existing Release for a clean slate
        run: |
          # Idempotent: exits 0 even if no release exists yet (first
          # run of a tag). Handles retargeted tags + retried runs.
          gh release delete "${GITHUB_REF_NAME}" --yes --cleanup-tag=false 2>&1 || true

      - name: Create GitHub Release with all board assets
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          cat > release-body.md <<'EOF'
          ## Flashing

          The easiest way to flash is the **web flasher** — visit
          https://thatSFguy.github.io/reticulum-lora-repeater/
          and pick this version from the dropdown. No toolchain
          install required, works in any Chromium-based browser.

          ## Manual flashing

          Per-board assets attached to this release:

          | File                    | How to use                                                              |
          |-------------------------|-------------------------------------------------------------------------|
          | `*.zip`                 | `adafruit-nrfutil dfu serial -pkg <zip> -p <port>`, or the web flasher  |
          | `*.hex`                 | nRFConnect Programmer, J-Link Commander, or any SWD tool                |

          Put the board in **bootloader mode** (double-tap reset within
          ~500 ms) before flashing over serial. The Adafruit nRF52
          bootloader exposes a different USB CDC device than the
          application firmware.
          EOF

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-body.md \
            $PRERELEASE_FLAG \
            release-assets/*

      - name: Stage firmware under docs/firmware/<tag>/ for webflasher
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TARGET="docs/firmware/${TAG}"
          mkdir -p "${TARGET}"
          cp -v release-assets/* "${TARGET}/"
          ls -la "${TARGET}"

      - name: Regenerate manifest
        run: python scripts/gen_firmware_manifest.py

      - name: Commit webflasher assets and push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/firmware/
          if git diff --cached --quiet; then
            echo "No firmware changes to commit."
            exit 0
          fi
          git commit -m "ci: publish ${GITHUB_REF_NAME} firmware to docs/firmware/"
          git push origin HEAD:master
