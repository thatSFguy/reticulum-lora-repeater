; ---------------------------------------------------------------------
; native — host-side unit tests for Config parsing etc.
; ---------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -Wall
    -Iinclude
    -Isrc
    -DNATIVE_BUILD
